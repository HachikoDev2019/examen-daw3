<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error Técnico</title>
    <style>
        /* Reutilizando tu base de estilos */
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .error-card {
            background: white;
            padding: 2.5rem;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(231, 76, 60, 0.2);
            max-width: 400px;
        }
        .icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }
        h2 { color: #c0392b; margin-bottom: 0.5rem; }
        p { color: #555; margin-bottom: 2rem; }
        .btn {
            display: inline-block;
            padding: 0.8rem 1.5rem;
            background-color: #e74c3c;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            transition: transform 0.2s;
        }
        .btn:hover { transform: scale(1.05); }
        .code {
            display: block;
            margin-top: 1.5rem;
            font-family: monospace;
            color: #999;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="error-card">
        <div class="icon">📽️💥</div>
        <h2>Se quemó la cinta</h2>
        <p>Estamos experimentando dificultades técnicas en el set. El equipo de producción ya está en ello.</p>
        <a href="{{ url_for('inicio') }}" class="btn">Volver al Inicio</a>
        <span class="code">Error 500: Internal Server Error</span>
    </div>
</body>
</html>
