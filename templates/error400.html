<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error en la Toma</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #1a1a1a;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .error-card {
            background: white;
            padding: 2.5rem;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            max-width: 400px;
            border-top: 8px solid #f1c40f; /* Color de advertencia */
        }
        .icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }
        h2 { color: #1a1a1a; margin-bottom: 0.5rem; }
        p { color: #666; margin-bottom: 2rem; }
        .btn {
            display: inline-block;
            padding: 0.8rem 1.5rem;
            background-color: #34495e;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            transition: background 0.3s;
        }
        .btn:hover { background-color: #2c3e50; }
    </style>
</head>
<body>
    <div class="error-card">
        <div class="icon">⚠️</div>
        <h2>¡Error en el Guion!</h2>
        <p>Parece que los datos enviados no son válidos para esta escena. Por favor, revisa el formulario.</p>
        <a href="javascript:history.back()" class="btn">Reintentar Toma</a>
    </div>
</body>
</html>
